services:
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo15-db:/var/lib/postgresql/data
    restart: unless-stopped

  odoo:
    image: odoo:15
    depends_on: [db]
    ports:
      - "0.0.0.0:8069:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo15-web:/var/lib/odoo
      - ./addons:/mnt/extra-addons
    restart: unless-stopped

volumes:
  odoo15-db:
  odoo15-web:
