name: Odoo Module Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run fleet_tests module tests
        run: |
          python /opt/odoo/odoo-bin \
            -c /tmp/odoo.conf \
            -d odoo_test \
            -i fleet_tests \
            --without-demo=all \
            --test-tags /fleet_tests \
            --stop-after-init \
            --log-level=test

      - name: Run om_hospital module tests
        run: |
          python /opt/odoo/odoo-bin \
            -c /tmp/odoo.conf \
            -d odoo_test \
            -i om_hospital \
            --without-demo=all \
            --test-tags /om_hospital \
            --stop-after-init \
            --log-level=test
