name: Deploy Odoo Modules

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Bring up Postgres + Odoo using the project's docker-compose.yml.
      # All Python/Odoo setup stays inside Docker — the runner is untouched.
      # sudo is required because the self-hosted runner user is not in the
      # docker group.
      # Docker is installed as a snap whose AppArmor profile restricts access
      # to /opt/ (where the runner workspace lives). Work around this by
      # copying the compose file to /tmp (which snap can always read) and
      # rewriting the relative ./addons volume to an absolute path so the
      # correct workspace directory is still bind-mounted by the daemon.
      - name: Prepare compose file
        run: |
          sed "s|\./addons|$GITHUB_WORKSPACE/addons|g" \
            "$GITHUB_WORKSPACE/docker-compose.yml" | sudo tee /tmp/docker-compose.yml > /dev/null

      - name: Start services with Docker Compose
        run: sudo docker compose -f /tmp/docker-compose.yml up -d

      # Poll until Postgres inside the compose stack accepts connections.
      - name: Wait for Postgres to be healthy
        run: |
          for i in $(seq 1 30); do
            sudo docker compose -f /tmp/docker-compose.yml exec -T db pg_isready -U odoo && break
            echo "Waiting for Postgres... ($i/30)"
            sleep 3
          done
          sudo docker compose -f /tmp/docker-compose.yml exec -T db pg_isready -U odoo

      # Create the odoo_test database, then initialise it with the base module
      # using the already-running compose stack.
      # docker compose run --no-deps reuses the running db service without
      # starting a second one.
      - name: Initialize test database
        run: |
          sudo docker compose -f /tmp/docker-compose.yml exec -T db createdb -U odoo odoo_test || true
          sudo docker compose -f /tmp/docker-compose.yml run --rm --no-deps \
            odoo \
            odoo \
              --db_host=db \
              --db_user=odoo \
              --db_password=odoo \
              -d odoo_test \
              -i base \
              --without-demo=all \
              --stop-after-init \
              --log-level=warn

      - name: Deploy modules
        run: |
          echo "Deploying Odoo modules to production..."
          echo "Modules: fleet_tests, om_hospital"
          # Add deployment steps here (e.g. SSH deploy, Docker push, etc.)
